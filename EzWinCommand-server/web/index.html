<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzWinCommand</title>
    <link rel="stylesheet" href="/static/style.css?v=20260717">
    <link rel="icon" href="/static/favicon.ico" sizes="any">
</head>
<body>

    <!-- ===== PC 管理面板（localhost 访问） ===== -->
    <div id="pc-panel" style="display:none">
        <h1>EzWinCommand 管理面板</h1>

        <!-- 当前配对请求与验证码仅在本机显示 -->
        <section id="pc-pairing-area">
            <div id="pc-pairing-list"></div>
            <button id="pc-refresh-btn" class="pc-refresh-btn">刷新</button>
        </section>

        <!-- 设备管理区 -->
        <details id="pc-device-manager">
            <summary>设备管理</summary>
            <table id="pc-device-table">
                <thead>
                    <tr>
                        <th>设备名</th>
                        <th>最后活跃</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="pc-device-tbody"></tbody>
            </table>
            <p id="pc-device-empty" style="display:none">暂无已配对设备</p>
        </details>

        <!-- 控制面板区 -->
        <section id="pc-control-panel">
            <div id="pc-actions" class="plugins-grid"></div>
            <p id="pc-error" class="ui-error"></p>
        </section>
    </div>

    <!-- ===== 外部页面（非 localhost 访问） ===== -->
    <div id="external-page" style="display:none">

        <!-- 配对待机页（无配对码时） -->
        <div id="ext-standby">
            <h1>EzWinCommand</h1>
            <p class="ext-waiting">等待 PC 端生成配对码…</p>
        </div>


        <!-- 外部控制面板（配对后） -->
        <div id="ext-dashboard" style="display:none">
            <h1>EzWinCommand</h1>
            <div id="ext-actions" class="plugins-grid"></div>

            <p id="ext-error" class="ui-error"></p>
            <details id="ext-device-manager">
                <summary>设备管理</summary>
                <table id="ext-device-table">
                    <thead>
                        <tr>
                            <th>设备名</th>
                            <th>配对时间</th>
                            <th>最后活跃</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="ext-device-tbody"></tbody>
                </table>
                <p id="ext-device-empty" style="display:none">暂无已配对设备</p>
            </details>
        </div>
    </div>

    <script src="/static/app.js?v=20260717"></script>
</body>
</html>
